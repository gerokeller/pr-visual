name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag and release
    # Only release when the upstream CI run succeeded (or when dispatched manually).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # On workflow_run, github.sha is master HEAD at trigger time, not the
          # commit that CI validated. Pin to the exact SHA that passed CI.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Decide whether to release
        id: decide
        run: |
          set -euo pipefail

          pkg=$(node -p "require('./package.json').version")
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          latest="${latest_tag#v}"

          echo "package.json version: ${pkg}"
          echo "latest tag: ${latest_tag:-<none>}"

          if [ -z "$latest" ]; then
            # No prior tags — release whatever package.json says.
            release="true"
          else
            higher=$(printf '%s\n%s\n' "$pkg" "$latest" | sort -V | tail -n1)
            if [ "$pkg" != "$latest" ] && [ "$higher" = "$pkg" ]; then
              release="true"
            else
              release="false"
            fi
          fi

          if [ "$release" = "true" ] && git rev-parse -q --verify "refs/tags/v${pkg}" >/dev/null; then
            echo "Tag v${pkg} already exists; skipping."
            release="false"
          fi

          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "version=${pkg}" >> "$GITHUB_OUTPUT"
          echo "tag=v${pkg}" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.decide.outputs.release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.decide.outputs.tag }}
          name: ${{ steps.decide.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          generate_release_notes: true
          make_latest: true
