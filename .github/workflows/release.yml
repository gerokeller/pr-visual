name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          pkg=$(node -p "require('./package.json').version")
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          latest="${latest_tag#v}"

          if [ -z "$latest" ]; then
            next="$pkg"
          else
            # If package.json was bumped above the latest tag, honor it (manual minor/major).
            # Otherwise auto-bump the patch segment of the latest tag.
            higher=$(printf '%s\n%s\n' "$pkg" "$latest" | sort -V | tail -n1)
            if [ "$pkg" != "$latest" ] && [ "$higher" = "$pkg" ]; then
              next="$pkg"
            else
              IFS='.' read -r major minor patch <<< "$latest"
              next="${major}.${minor}.$((patch + 1))"
            fi
          fi

          if git rev-parse -q --verify "refs/tags/v${next}" >/dev/null; then
            echo "Tag v${next} already exists; nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=${next}" >> "$GITHUB_OUTPUT"
            echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
