name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-flight runs for the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Playwright's official image ships Chromium, all system deps, ffmpeg,
    # and Node 20 preinstalled — skips the slow apt-get font install that
    # `playwright install-deps` would otherwise pull in on every run.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint + format check (Biome)
        run: npm run lint

      - name: Test (unit + integration + e2e)
        run: npm test
